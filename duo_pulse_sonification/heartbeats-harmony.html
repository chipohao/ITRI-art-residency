<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Heartbeats in Harmony</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #999999;
    }

    h1 {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    #controls {
      display: flex;
      gap: 36px;
      padding-bottom: 14px;
      align-items: flex-end;
    }

    .ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .lbl { font-size: 10px; letter-spacing: 3px; opacity: 0.7; text-transform: uppercase; }
    .val { font-size: 34px; line-height: 1.1; color: #cccccc; }
    .sub { font-size: 9px; letter-spacing: 1px; opacity: 0.45; min-height: 12px; }

    .divider {
      width: 1px;
      height: 50px;
      background: #222222;
      margin-bottom: 8px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 110px;
      height: 1px;
      background: #252525;
      cursor: pointer;
      margin-top: 7px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    #wrap {
      position: relative;
      width: 720px;
      height: 500px;
    }

    #wrap canvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
    }

    #scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 3px
      );
      z-index: 2;
    }

    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        transparent 38%,
        rgba(0,0,0,0.72) 100%
      );
      z-index: 3;
    }

    #footer {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-top: 14px;
    }

    button {
      background: none;
      border: 1px solid #2a2a2a;
      color: #888888;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 5px 14px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    #ratio { font-size: 9px; letter-spacing: 2px; opacity: 0.45; }

    #serial-status {
      font-size: 8px;
      letter-spacing: 2px;
      opacity: 0.35;
    }
    #serial-status.connected { color: #88cc44; opacity: 0.7; }
    #serial-status.calibrating { color: #aaaaaa; opacity: 0.7; }

    #pen-coords {
      font-size: 8px;
      letter-spacing: 2px;
      opacity: 0.45;
      font-variant-numeric: tabular-nums;
      min-width: 140px;
      text-align: center;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background: none;
      border: 1px solid #2a2a2a;
      color: #888888;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 5px 10px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s;
      max-width: 180px;
    }
    select:hover, select:focus { opacity: 0.9; outline: none; }
    select option { background: #000000; color: #888888; }

    .finger-toggle {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: none;
      border: 1px solid #333;
      color: #555;
      padding: 4px 10px;
      cursor: pointer;
      opacity: 0.6;
      transition: all 0.3s;
    }
    .ctrl.inactive .val { opacity: 0.25; }
    .ctrl.inactive .sub { opacity: 0.15; }
    .ctrl.inactive input[type=range] { opacity: 0.2; pointer-events: none; }

    .finger-toggle.on {
      border-color: #88cc44;
      color: #88cc44;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h1>Heartbeats in Harmony</h1>

  <div id="controls">
    <div class="ctrl">
      <div class="lbl">Heart A</div>
      <div class="val" id="val-a">72</div>
      <div class="sub" id="hz-a">1.20 Hz</div>
      <input type="range" id="sl-a" min="40" max="160" value="72">
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <div class="lbl">Heart B</div>
      <div class="val" id="val-b">80</div>
      <div class="sub" id="hz-b">1.33 Hz</div>
      <input type="range" id="sl-b" min="40" max="160" value="80">
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <div class="lbl">Phase</div>
      <div class="val" id="val-phase">45°</div>
      <div class="sub">&nbsp;</div>
      <input type="range" id="sl-phase" min="0" max="360" value="45" step="1">
    </div>

    <div class="divider"></div>

    <div class="ctrl">
      <div class="lbl">Trail</div>
      <div class="val" id="val-fade">∞</div>
      <div class="sub" id="sub-fade">&nbsp;</div>
      <input type="range" id="sl-fade" min="0" max="100" value="0" step="1">
    </div>
  </div>

  <div id="wrap">
    <div id="scanlines"></div>
    <div id="vignette"></div>
  </div>

  <div id="footer">
    <button id="btn-fa" class="finger-toggle on">A on</button>
    <button id="btn-fb" class="finger-toggle on">B on</button>
    <div id="ratio">ratio —</div>
    <button id="btn-scan">Scan Port</button>
    <select id="sel-port"><option value="">— no port —</option></select>
    <div id="serial-status">disconnected</div>
    <div id="pen-coords">x —&nbsp;&nbsp;&nbsp; y —</div>
    <button id="btn-clear">Clear</button>
  </div>

  <script>
    const state = {
      bpmA:    72,
      bpmB:    80,
      phase:   Math.PI / 4,
      fade:    0,
      fingerA: true,
      fingerB: true
    };
    let needsClear = false;

    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    function updateRatio() {
      const g = gcd(state.bpmA, state.bpmB);
      document.getElementById('ratio').textContent =
        `ratio  ${state.bpmA/g} : ${state.bpmB/g}`;
    }
    updateRatio();

    document.getElementById('sl-a').addEventListener('input', function() {
      state.bpmA = +this.value;
      if (state.fingerA) {
        document.getElementById('val-a').textContent = this.value;
        document.getElementById('hz-a').textContent = (state.bpmA/60).toFixed(2) + ' Hz';
      }
      updateRatio();
    });
    document.getElementById('sl-b').addEventListener('input', function() {
      state.bpmB = +this.value;
      if (state.fingerB) {
        document.getElementById('val-b').textContent = this.value;
        document.getElementById('hz-b').textContent = (state.bpmB/60).toFixed(2) + ' Hz';
      }
      updateRatio();
    });
    document.getElementById('sl-phase').addEventListener('input', function() {
      state.phase = +this.value * Math.PI / 180;
      document.getElementById('val-phase').textContent = this.value + '°';
    });
    document.getElementById('sl-fade').addEventListener('input', function() {
      state.fade = +this.value;
      if (state.fade === 0) {
        document.getElementById('val-fade').textContent = '∞';
        document.getElementById('sub-fade').textContent = '\u00a0';
      } else {
        const hl = Math.pow(20, 1 - state.fade / 100) * 0.3;
        document.getElementById('val-fade').textContent = hl < 1 ? hl.toFixed(1) : Math.round(hl);
        document.getElementById('sub-fade').textContent = 'sec';
      }
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      needsClear = true;
    });

    // ── Finger toggle buttons (simulation) ──────────────────────────────
    const btnFa = document.getElementById('btn-fa');
    const btnFb = document.getElementById('btn-fb');

    // 上方控制區的 DOM 參照
    const ctrlA = document.getElementById('sl-a').closest('.ctrl');
    const ctrlB = document.getElementById('sl-b').closest('.ctrl');

    function updateFingerBtn(btn, key, on) {
      state[key] = on;
      btn.classList.toggle('on', on);
      if (key === 'fingerA') {
        btn.textContent = on ? 'A on' : 'A off';
        ctrlA.classList.toggle('inactive', !on);
        document.getElementById('val-a').textContent = on ? state.bpmA : '—';
        document.getElementById('hz-a').textContent  = on ? (state.bpmA / 60).toFixed(2) + ' Hz' : '';
      } else {
        btn.textContent = on ? 'B on' : 'B off';
        ctrlB.classList.toggle('inactive', !on);
        document.getElementById('val-b').textContent = on ? state.bpmB : '—';
        document.getElementById('hz-b').textContent  = on ? (state.bpmB / 60).toFixed(2) + ' Hz' : '';
      }
    }

    btnFa.addEventListener('click', () => {
      updateFingerBtn(btnFa, 'fingerA', !state.fingerA);
    });
    btnFb.addEventListener('click', () => {
      updateFingerBtn(btnFb, 'fingerB', !state.fingerB);
    });

    // ── Web Serial API ────────────────────────────────────────────────────
    let serialPort   = null;
    let serialReader = null;
    let availablePorts = [];
    const statusEl  = document.getElementById('serial-status');
    const selPort   = document.getElementById('sel-port');
    const coordsEl  = document.getElementById('pen-coords');

    // ── Max jweb integration ──────────────────────────────────────────────
    // 偵測是否在 Max [jweb] 環境中執行
    const inJweb = (typeof max !== 'undefined');

    if (inJweb) {
      // 在 Max 中：隱藏 Web Serial 控制項
      document.getElementById('btn-scan').style.display  = 'none';
      document.getElementById('sel-port').style.display  = 'none';
      setSerialStatus('calibrating', 'max mode');
    }

    // Max 透過 [script setMaxBpmA 72] 呼叫以下 function，控制視覺化
    // 在 Max patch 中：[prepend script setMaxBpmA] → [jweb]
    function setMaxBpmA(v)    { applyBpmA(v); }
    function setMaxBpmB(v)    { applyBpmB(v); }
    function setMaxFingerA(v) { updateFingerBtn(btnFa, 'fingerA', v === 1); }
    function setMaxFingerB(v) { updateFingerBtn(btnFb, 'fingerB', v === 1); }
    function setMaxBeatA()    { state.triggerBeatA = true; }
    function setMaxBeatB()    { state.triggerBeatB = true; }

    // ── WebSocket → OSC relay (非 jweb 環境使用) ─────────────────────────
    let wsRelay = null;

    if (!inJweb) {
      function connectWsRelay() {
        try {
          wsRelay = new WebSocket('ws://localhost:8080');
          wsRelay.addEventListener('open',  () => console.log('[ws-relay] connected'));
          wsRelay.addEventListener('close', () => {
            wsRelay = null;
            setTimeout(connectWsRelay, 3000);
          });
          wsRelay.addEventListener('error', () => {});
        } catch(e) {}
      }
      connectWsRelay();
    }

    // penWrite: jweb → max.outlet，否則走 WebSocket relay
    function penWrite(text) {
      if (inJweb) {
        text.split('\n').forEach(line => {
          line = line.trim();
          if (!line) return;
          const m = line.match(/^(\/\S+)\s+([-\d.]+)/);
          if (!m) return;
          max.outlet(m[1], parseFloat(m[2]));  // 直接送到 Max outlet
        });
      } else if (wsRelay && wsRelay.readyState === WebSocket.OPEN) {
        wsRelay.send(text);
      }
    }

    function setSerialStatus(cls, text) {
      statusEl.className   = cls;
      statusEl.textContent = text;
    }

    function portLabel(port, idx) {
      const info = port.getInfo();
      if (info.usbVendorId) {
        const vid = info.usbVendorId.toString(16).padStart(4, '0');
        const pid = info.usbProductId.toString(16).padStart(4, '0');
        return `port ${idx + 1}  [${vid}:${pid}]`;
      }
      return `port ${idx + 1}`;
    }

    function renderPortList() {
      while (selPort.options.length > 1) selPort.remove(1);
      availablePorts.forEach((p, i) => selPort.add(new Option(portLabel(p, i), i)));
    }

    function applyBpmA(bpm) {
      bpm = Math.max(40, Math.min(160, bpm));
      state.bpmA = bpm;
      document.getElementById('sl-a').value        = bpm;
      document.getElementById('val-a').textContent = bpm;
      document.getElementById('hz-a').textContent  = (bpm / 60).toFixed(2) + ' Hz';
      updateRatio();
    }

    function applyBpmB(bpm) {
      bpm = Math.max(40, Math.min(160, bpm));
      state.bpmB = bpm;
      document.getElementById('sl-b').value        = bpm;
      document.getElementById('val-b').textContent = bpm;
      document.getElementById('hz-b').textContent  = (bpm / 60).toFixed(2) + ' Hz';
      updateRatio();
    }

    async function readSerial() {
      setSerialStatus('calibrating', 'calibrating...');
      let buf = '';
      const td = new TextDecoder();
      serialReader = serialPort.readable.getReader();

      try {
        while (true) {
          const { value, done } = await serialReader.read();
          if (done) break;
          buf += td.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf('\n')) !== -1) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            const m = line.match(/^\/pulse\/(userA|userB)\/(bpm|finger|beat)\s+(\d+)/);
            if (!m) continue;
            const [, user, type, valStr] = m;
            const val = parseInt(valStr, 10);
            if (type === 'bpm' && val > 30) {
              if (user === 'userA') applyBpmA(val);
              else                  applyBpmB(val);
              setSerialStatus('connected', 'connected');
            } else if (type === 'finger') {
              if (user === 'userA') updateFingerBtn(btnFa, 'fingerA', val === 1);
              else                  updateFingerBtn(btnFb, 'fingerB', val === 1);
            } else if (type === 'beat' && val === 1) {
              // Trigger beat flash directly from real hardware beat
              if (user === 'userA') state.triggerBeatA = true;
              else                  state.triggerBeatB = true;
            }
          }
        }
      } catch (e) {
        // cancelled or port closed
      } finally {
        try { serialReader.releaseLock(); } catch {}
        serialReader  = null;
        updateFingerBtn(btnFa, 'fingerA', false);
        updateFingerBtn(btnFb, 'fingerB', false);
        setSerialStatus('', 'disconnected');
        selPort.value = '';
      }
    }

    async function disconnectCurrent() {
      if (!serialPort) return;
      const p = serialPort;
      serialPort = null;
      try { await serialReader?.cancel(); } catch {}
      await new Promise(r => setTimeout(r, 80));
      try { await p.close(); } catch {}
    }

    async function connectToPort(port) {
      await disconnectCurrent();
      serialPort = port;
      try {
        await serialPort.open({ baudRate: 115200 });
        readSerial();
      } catch (e) {
        serialPort = null;
        setSerialStatus('', 'open failed');
        selPort.value = '';
      }
    }

    selPort.addEventListener('change', function () {
      if (this.value === '') { disconnectCurrent(); return; }
      connectToPort(availablePorts[+this.value]);
    });

    document.getElementById('btn-scan').addEventListener('click', async () => {
      if (!navigator.serial) {
        alert('Web Serial API not supported.\nPlease use Chrome or Edge (desktop).');
        return;
      }
      try {
        const newPort = await navigator.serial.requestPort();
        if (!availablePorts.includes(newPort)) availablePorts.push(newPort);
        renderPortList();
        selPort.value = availablePorts.indexOf(newPort);
        connectToPort(newPort);
      } catch (e) { /* user cancelled */ }
    });

    if (navigator.serial) {
      navigator.serial.getPorts().then(ports => {
        availablePorts = ports;
        renderPortList();
      });
      navigator.serial.addEventListener('disconnect', () => {
        navigator.serial.getPorts().then(ports => {
          availablePorts = ports;
          renderPortList();
        });
      });
    }

    // Also expose beat triggers on state for serial-driven flash
    state.triggerBeatA = false;
    state.triggerBeatB = false;

    new p5(function(p) {
      const W = 720, H = 500;
      const LX = W / 2, LY = 195, LRX = 255, LRY = 125;
      const CA = { x: 80,  y: 370, r: 48 };
      const CB = { x: 640, y: 370, r: 48 };

      let pg1, pg2;
      let t = 0;
      let angleA = -Math.PI / 2;
      let angleB = -Math.PI / 2;
      let prevAngleA = angleA;
      let prevAngleB = angleB;
      let pulseA = { r: 0, a: 0 };
      let pulseB = { r: 0, a: 0 };
      let flashA = 0;   // beat flash brightness, 0–255
      let flashB = 0;
      let ampX = 1;     // x-axis amplitude, 0 (no fingerA) → 1 (fingerA active)
      let ampY = 1;     // y-axis amplitude, 0 (no fingerB) → 1 (fingerB active)

      p.setup = function() {
        const cv = p.createCanvas(W, H);
        cv.parent('wrap');
        cv.elt.style.zIndex = '1';

        pg1 = p.createGraphics(W, H);
        pg2 = p.createGraphics(W, H);
        pg1.background(0);
        pg2.background(0);
        p.noSmooth();
      };

      p.draw = function() {
        if (needsClear) {
          pg1.background(0);
          pg2.background(0);
          t = 0;
          angleA = prevAngleA = -Math.PI / 2;
          angleB = prevAngleB = -Math.PI / 2;
          pulseA = { r: 0, a: 0 };
          pulseB = { r: 0, a: 0 };
          flashA = 0; flashB = 0;
          ampX = 0; ampY = 0;
          needsClear = false;
        }

        const dt    = Math.min(p.deltaTime / 1000, 0.05);
        const freqA = state.bpmA / 60;
        const freqB = state.bpmB / 60;

        // ── Amplitude envelope (finger on/off → smooth fade) ────────
        const smoothing = 1 - Math.exp(-dt / 1.2);  // ~2-3s transition
        ampX += (( state.fingerA ? 1.0 : 0.0 ) - ampX) * smoothing;
        ampY += (( state.fingerB ? 1.0 : 0.0 ) - ampY) * smoothing;

        // ── Step 1: Fade ──────────────────────────────────────────────
        pg2.background(0);

        if (state.fade > 0) {
          const halfLife  = Math.pow(20, 1 - state.fade / 100) * 0.3;
          const keepRatio = Math.pow(0.5, dt / halfLife);
          pg2.drawingContext.globalAlpha = keepRatio;
          pg2.drawingContext.drawImage(pg1.elt, 0, 0, W, H);  // W,H fix retina (pixelDensity=2)
          pg2.drawingContext.globalAlpha = 1.0;
        } else {
          pg2.drawingContext.drawImage(pg1.elt, 0, 0, W, H);
        }

        // ── Step 2: Sand particles → pg2 (white) ──────────────────────
        const SUB = 10;
        pg2.drawingContext.shadowBlur  = 5;
        pg2.drawingContext.shadowColor = 'rgba(255, 255, 255, 0.22)';

        for (let s = 0; s < SUB; s++) {
          const ts = t + s * (dt / SUB);
          const x  = LX + LRX * Math.sin(freqA * ts * p.TWO_PI) * ampX;
          const y  = LY + LRY * Math.sin(freqB * ts * p.TWO_PI + state.phase) * ampY;

          for (let i = 0; i < 12; i++) {
            const ox = p.randomGaussian(0, 1.5);
            const oy = p.randomGaussian(0, 1.5);
            const d2 = ox * ox + oy * oy;
            const al = p.map(d2, 0, 10, 150, 10, true);
            pg2.noStroke();
            pg2.fill(255, 255, 255, al);
            pg2.circle(x + ox, y + oy, p.random(0.5, 1.8));
          }
        }

        pg2.drawingContext.shadowBlur = 0;

        // ── Step 3: Swap buffers ──────────────────────────────────────
        [pg1, pg2] = [pg2, pg1];

        const penX = LX + LRX * Math.sin(freqA * t * p.TWO_PI) * ampX;
        const penY = LY + LRY * Math.sin(freqB * t * p.TWO_PI + state.phase) * ampY;
        t += dt;

        // ── Step 4: Beat detect (simulated from angle, or real from serial) ──
        prevAngleA = angleA;
        prevAngleB = angleB;
        if (state.fingerA) angleA += freqA * dt * p.TWO_PI;
        if (state.fingerB) angleB += freqB * dt * p.TWO_PI;

        const beatA = state.fingerA && ((angleA % p.TWO_PI) < (prevAngleA % p.TWO_PI) || state.triggerBeatA);
        const beatB = state.fingerB && ((angleB % p.TWO_PI) < (prevAngleB % p.TWO_PI) || state.triggerBeatB);
        state.triggerBeatA = false;
        state.triggerBeatB = false;

        if (beatA) { pulseA.r = CA.r * 1.1; pulseA.a = 200; flashA = 255; }
        if (beatB) { pulseB.r = CB.r * 1.1; pulseB.a = 200; flashB = 255; }

        // Expanding ring decay
        pulseA.r += dt * 55;  pulseA.a = Math.max(0, pulseA.a - dt * 280);
        pulseB.r += dt * 55;  pulseB.a = Math.max(0, pulseB.a - dt * 280);

        // Flash decay (~0.45s)
        flashA = Math.max(0, flashA - dt * 560);
        flashB = Math.max(0, flashB - dt * 560);

        const dotAX = CA.x + CA.r * Math.cos(angleA);
        const dotAY = CA.y + CA.r * Math.sin(angleA);
        const dotBX = CB.x + CB.r * Math.cos(angleB);
        const dotBY = CB.y + CB.r * Math.sin(angleB);

        // ── Step 5: Render ────────────────────────────────────────────
        p.image(pg1, 0, 0);

        // Connection lines (glow + dashed) — only show when finger active
        if (ampX > 0.01 || ampY > 0.01) {
          p.drawingContext.shadowBlur  = 8;
          p.drawingContext.shadowColor = 'rgba(255, 255, 255, 0.3)';
          p.drawingContext.setLineDash([4, 5]);
          p.noFill();
          if (ampX > 0.01) {
            p.stroke(255, 255, 255, 90 * ampX);
            p.strokeWeight(1.2);
            p.line(dotAX, dotAY, penX, penY);
          }
          if (ampY > 0.01) {
            p.stroke(255, 255, 255, 90 * ampY);
            p.strokeWeight(1.2);
            p.line(dotBX, dotBY, penX, penY);
          }
          p.drawingContext.setLineDash([]);
          p.drawingContext.shadowBlur = 0;
        }

        // ── Circle A ─────────────────────────
        const oA = state.fingerA ? 1.0 : 0.2;  // opacity multiplier

        if (flashA > 0) {
          p.noStroke();
          p.fill(255, 255, 255, flashA * 0.65);
          p.circle(CA.x, CA.y, CA.r * 2);
        }

        p.noFill();
        p.stroke(255, 255, 255, 80 * oA);
        p.strokeWeight(1.2);
        p.circle(CA.x, CA.y, CA.r * 2);

        if (pulseA.a > 0) {
          p.noFill();
          p.stroke(255, 255, 255, pulseA.a);
          p.strokeWeight(1);
          p.circle(CA.x, CA.y, pulseA.r * 2);
        }

        if (state.fingerA) {
          p.stroke(255, 255, 255, 55);
          p.strokeWeight(0.8);
          p.line(CA.x, CA.y, dotAX, dotAY);

          p.noStroke(); p.fill(255, 255, 255, 100);
          p.circle(CA.x, CA.y, 4);

          p.noStroke(); p.fill(255, 255, 255, 230);
          p.circle(dotAX, dotAY, 8);
        } else {
          p.noStroke(); p.fill(255, 255, 255, 25);
          p.circle(CA.x, CA.y, 4);
        }

        p.noStroke();
        p.textFont('Courier New');
        p.textAlign(p.CENTER);
        p.fill(255, 255, 255, 160 * oA);
        p.textSize(10);
        p.text('HEART  A', CA.x, CA.y + CA.r + 16);
        p.fill(255, 255, 255, 120 * oA);
        p.textSize(9);
        p.text(state.fingerA ? state.bpmA + ' BPM' : '— —', CA.x, CA.y + CA.r + 28);
        p.noStroke();
        p.fill(255, 255, 255, state.fingerA ? 220 : 30);
        p.circle(CA.x, CA.y + CA.r + 40, 5);

        // ── Circle B ─────────────────────────
        const oB = state.fingerB ? 1.0 : 0.2;

        if (flashB > 0) {
          p.noStroke();
          p.fill(255, 255, 255, flashB * 0.65);
          p.circle(CB.x, CB.y, CB.r * 2);
        }

        p.noFill();
        p.stroke(255, 255, 255, 80 * oB);
        p.strokeWeight(1.2);
        p.circle(CB.x, CB.y, CB.r * 2);

        if (pulseB.a > 0) {
          p.noFill();
          p.stroke(255, 255, 255, pulseB.a);
          p.strokeWeight(1);
          p.circle(CB.x, CB.y, pulseB.r * 2);
        }

        if (state.fingerB) {
          p.stroke(255, 255, 255, 55);
          p.strokeWeight(0.8);
          p.line(CB.x, CB.y, dotBX, dotBY);

          p.noStroke(); p.fill(255, 255, 255, 100);
          p.circle(CB.x, CB.y, 4);

          p.noStroke(); p.fill(255, 255, 255, 230);
          p.circle(dotBX, dotBY, 8);
        } else {
          p.noStroke(); p.fill(255, 255, 255, 25);
          p.circle(CB.x, CB.y, 4);
        }

        p.noStroke();
        p.textFont('Courier New');
        p.textAlign(p.CENTER);
        p.fill(255, 255, 255, 160 * oB);
        p.textSize(10);
        p.text('HEART  B', CB.x, CB.y + CB.r + 16);
        p.fill(255, 255, 255, 120 * oB);
        p.textSize(9);
        p.text(state.fingerB ? state.bpmB + ' BPM' : '— —', CB.x, CB.y + CB.r + 28);
        p.noStroke();
        p.fill(255, 255, 255, state.fingerB ? 220 : 30);
        p.circle(CB.x, CB.y + CB.r + 40, 5);

        // ── Pen dot ───────────────────────────
        p.noStroke(); p.fill(255, 255, 255, 220);
        p.circle(penX, penY, 5);

        // ── Pen coordinates output (every frame ~60Hz) ────
        const normX = (penX - LX) / LRX;
        const normY = (penY - LY) / LRY;
        penWrite(`/pen/x ${normX.toFixed(4)}\n/pen/y ${normY.toFixed(4)}\n`);
        if (p.frameCount % 3 === 0) {
          const xs = (normX >= 0 ? '+' : '') + normX.toFixed(3);
          const ys = (normY >= 0 ? '+' : '') + normY.toFixed(3);
          coordsEl.textContent = `x ${xs}   y ${ys}`;
        }
      };
    });
  </script>
</body>
</html>
